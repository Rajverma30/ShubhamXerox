<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Stationery Item | Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css?v=3.1">
  <link rel="icon" type="image/png" href="images/logo.png">
</head>
<body style="background-color: var(--bg-color);">
  <nav class="navbar">
    <div class="container">
      <a href="/" class="logo" style="display:flex; flex-direction:column; gap:2px; padding:4px 0;">
        <img src="images/logo.png" alt="Shubham Xerox" style="width:45px; height:45px; object-fit:contain;">
        <span style="font-size:0.75rem; letter-spacing:1px; color:var(--text-main); font-weight:800; margin-top:-6px;">SHUBHAM XEROX</span>
      </a>
      <div class="nav-links" id="adminNavLinks" style="display: none;">
        <a href="/admin">Dashboard</a>
        <div class="nav-dropdown">
          <button type="button" class="nav-dropdown-trigger">Quick Add</button>
          <div class="nav-dropdown-menu">
            <a href="/admin-add">Add Books</a>
            <a href="/admin-categories">Add/Edit Category</a>
            <a href="/admin-add-stationery">Add Stationery Item</a>
            <a href="/admin-add-spiral">Add Spiral Copy</a>
            <a href="/admin-add-combo">Add Combo Deal</a>
          </div>
        </div>
        <div class="nav-dropdown">
          <button type="button" class="nav-dropdown-trigger">Quick Manage</button>
          <div class="nav-dropdown-menu">
            <a href="/admin-products">Manage Books</a>
            <a href="/admin-ebooks">Manage E-Books</a>
          </div>
        </div>
        <div class="nav-dropdown">
          <button type="button" class="nav-dropdown-trigger">Orders</button>
          <div class="nav-dropdown-menu">
            <a href="/admin-orders">Book orders</a>
            <a href="/admin-photocopy">Photocopy orders</a>
            <a href="/admin-pdf-sales">Paid PDF orders</a>
            <a href="/admin-returns">Returned orders</a>
          </div>
        </div>
        <a href="/admin-chat" style="color: #44bd32; font-weight: 600;">Chat</a>
        <a href="#" onclick="logout()">Logout</a>
      </div>
      <div class="nav-icons"></div>
    </div>
  </nav>

  <main class="section" style="padding-top:40px; min-height:80vh;">
    <div class="container" style="max-width:700px;">
      <div class="admin-card">
        <h1 style="font-size:1.45rem; margin-bottom:16px;">Add Stationery Item</h1>
        <p style="color:var(--text-muted); margin-bottom:18px;">You can add notebooks in the stationery section as well.</p>
        <form id="adminStationeryForm">
          <div class="form-group">
            <label for="stationeryName">Product Name</label>
            <input type="text" id="stationeryName" class="form-control" required placeholder="e.g. A4 Notebook, Pen Set">
          </div>
          <div class="form-group">
            <label for="stationeryPrice">Selling Price (₹)</label>
            <input type="number" id="stationeryPrice" class="form-control" min="0" step="0.01" required placeholder="99">
          </div>
          <div class="form-group">
            <label for="stationeryImageFile">Photo</label>
            <input type="file" id="stationeryImageFile" class="form-control" accept="image/*">
          </div>
          <div style="text-align:center; margin: 10px 0; color:var(--text-muted);">OR</div>
          <div class="form-group">
            <label for="stationeryImageUrl">Image URL</label>
            <input type="url" id="stationeryImageUrl" class="form-control" placeholder="https://...">
          </div>
          <button type="submit" class="btn btn-primary" style="width:100%; margin-top:12px;">Add Stationery Item</button>
        </form>
      </div>
    </div>
  </main>

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="/config.js"></script>
  <script defer src="assets/js/script.js?v=3.1"></script>
</body>
</html>
