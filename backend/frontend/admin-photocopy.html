<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photocopy Orders | Admin | Shubham Xerox</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css?v=3.1">
  <link rel="icon" type="image/png" href="images/logo.png">
</head>
<body style="background-color: var(--bg-color);">

  <nav class="navbar">
    <div class="container">
      <a href="/" class="logo" style="display: flex; flex-direction: column; gap: 2px; padding: 4px 0;">
        <img src="images/logo.png" alt="Shubham Xerox" style="width:45px; height:45px; object-fit:contain;">
        <span style="font-size: 0.75rem; letter-spacing: 1px; color: var(--text-main); font-weight: 800; margin-top: -6px;">SHUBHAM XEROX</span>
      </a>
      <div class="nav-links" id="adminNavLinks" style="display: none;">
        <a href="/admin">Dashboard</a>
        <div class="nav-dropdown">
          <button type="button" class="nav-dropdown-trigger">Quick Add</button>
          <div class="nav-dropdown-menu">
            <a href="/admin-add">Add Books</a>
            <a href="/admin-categories">Add/Edit Category</a>
            <a href="/admin-add-stationery">Add Stationery Item</a>
            <a href="/admin-add-spiral">Add Spiral Copy</a>
            <a href="/admin-add-combo">Add Combo Deal</a>
          </div>
        </div>
        <div class="nav-dropdown">
          <button type="button" class="nav-dropdown-trigger">Quick Manage</button>
          <div class="nav-dropdown-menu">
            <a href="/admin-products">Manage Books</a>
            <a href="/admin-ebooks">Manage E-Books</a>
          </div>
        </div>
        <div class="nav-dropdown">
          <button type="button" class="nav-dropdown-trigger">Orders</button>
          <div class="nav-dropdown-menu">
            <a href="/admin-orders">Book orders</a>
            <a href="/admin-photocopy">Photocopy orders</a>
            <a href="/admin-pdf-sales">Paid PDF orders</a>
            <a href="/admin-returns">Returned orders</a>
          </div>
        </div>
        <a href="/admin-chat" style="color: #44bd32; font-weight: 600;">Chat</a>
        <a href="#" onclick="logout()">Logout</a>
      </div>
      <div class="nav-icons">
        <!-- Theme Switch Injected by JS -->
      </div>
    </div>
  </nav>

  <main class="section" style="padding-top: 40px; min-height: 80vh;">
    <div class="container">

      <!-- Header row -->
      <div style="display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:16px; margin-bottom:32px;">
        <div>
          <h1 style="font-size:1.75rem; font-weight:800; color:var(--text-main); margin:0;">Photocopy Orders</h1>
          <p id="adminPhotocopyCountLabel" style="color:var(--text-muted); margin-top:6px; font-size:0.9rem;">Total: —</p>
          <p style="color:var(--text-muted); margin-top:2px; font-size:0.85rem;">Manage photocopy &amp; printing orders from customers</p>
        </div>
        <button class="btn btn-secondary" onclick="renderAdminPhotocopyOrders()" style="gap:8px;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
          Refresh
        </button>
      </div>
      <div style="max-width: 520px; margin: -10px 0 22px 0;">
        <input id="adminPhotocopySearch" type="text" class="form-control" placeholder="Search by Order ID (e.g. COPY...)" style="border-radius: var(--radius-full); padding: 12px 18px;">
      </div>

      <!-- Orders List -->
      <div id="adminPhotocopyOrdersList">
        <div style="padding:40px; text-align:center; color:var(--text-muted);">Loading orders&hellip;</div>
      </div>

    </div>
  </main>

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="/config.js"></script>
  <script defer src="assets/js/script.js?v=4.0"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      setTimeout(() => {
        checkAdminAccess();
        renderAdminPhotocopyOrders();
      }, 800);
    });
  </script>
</body>
</html>
