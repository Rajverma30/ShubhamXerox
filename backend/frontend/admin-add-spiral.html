<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Spiral Copy | Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css?v=2.9">
  <link rel="icon" type="image/png" href="images/logo.png">
</head>
<body style="background-color:var(--bg-color);">
  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="logo" style="display:flex; flex-direction:column; gap:2px; padding:4px 0;">
        <img src="images/logo.png" alt="Shubham Xerox" style="width:45px; height:45px; object-fit:contain;">
        <span style="font-size:0.75rem; letter-spacing:1px; color:var(--text-main); font-weight:800; margin-top:-6px;">SHUBHAM XEROX</span>
      </a>
      <div class="nav-links" id="adminNavLinks" style="display:none;">
        <a href="admin.html">Dashboard</a>
        <div class="nav-dropdown">
          <button type="button" class="nav-dropdown-trigger">Quick Add</button>
          <div class="nav-dropdown-menu">
            <a href="admin-add.html">Add Books</a>
            <a href="admin-categories.html">Add/Edit Category</a>
            <a href="admin-add-stationery.html">Add Stationery Item</a>
            <a href="admin-add-spiral.html">Add Spiral Copy</a>
            <a href="admin-add-combo.html">Add Combo Deal</a>
          </div>
        </div>
        <div class="nav-dropdown">
          <button type="button" class="nav-dropdown-trigger">Quick Manage</button>
          <div class="nav-dropdown-menu">
            <a href="admin-products.html">Manage Books</a>
            <a href="admin-ebooks.html">Manage E-Books</a>
          </div>
        </div>
        <div class="nav-dropdown">
          <button type="button" class="nav-dropdown-trigger">Orders</button>
          <div class="nav-dropdown-menu">
            <a href="admin-orders.html">Book orders</a>
            <a href="admin-photocopy.html">Photocopy orders</a>
            <a href="admin-pdf-sales.html">Paid PDF orders</a>
            <a href="admin-returns.html">Returned orders</a>
          </div>
        </div>
        <a href="admin-chat.html" style="color:#44bd32; font-weight:600;">Chat</a>
        <a href="#" onclick="logout()">Logout</a>
      </div>
      <div class="nav-icons"></div>
    </div>
  </nav>

  <main class="section" style="padding-top:40px; min-height:80vh;">
    <div class="container" style="max-width:700px;">
      <div class="admin-card">
        <h1 style="font-size:1.45rem; margin-bottom:16px;">Add Spiral Copy</h1>
        <p style="color:var(--text-muted); margin-bottom:18px;">Add a ready spiral copy item to the Spiral Copies category.</p>
        <form id="adminStationeryForm">
          <input type="hidden" id="stationeryCategory" value="Spiral Copies">
          <div class="form-group">
            <label for="stationeryName">Copy Name</label>
            <input type="text" id="stationeryName" class="form-control" required placeholder="e.g. Class Notes Copy">
          </div>
          <div class="form-group">
            <label for="spiralPages">Pages</label>
            <input type="number" id="spiralPages" class="form-control" min="1" step="1" required placeholder="100">
          </div>
          <div class="form-group">
            <label for="stationeryPrice">Selling Price (&#8377;)</label>
            <input type="number" id="stationeryPrice" class="form-control" min="0" step="0.01" required placeholder="80">
          </div>
          <div class="form-group">
            <label for="stationeryImageFile">Photo</label>
            <input type="file" id="stationeryImageFile" class="form-control" accept="image/*">
          </div>
          <div style="text-align:center; margin:10px 0; color:var(--text-muted);">OR</div>
          <div class="form-group">
            <label for="stationeryImageUrl">Image URL</label>
            <input type="url" id="stationeryImageUrl" class="form-control" placeholder="https://...">
          </div>
          <button type="submit" class="btn btn-primary" style="width:100%; margin-top:12px;">Add Spiral Copy</button>
        </form>
      </div>
    </div>
  </main>

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="/config.js"></script>
  <script defer src="assets/js/script.js?v=2.9"></script>
</body>
</html>
