<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Orders | Shubham Xerox</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css?v=3.2">
<link rel="icon" type="image/png" href="images/logo.png">
</head>
<body style="background-color: var(--bg-color);">

  <nav class="navbar">
    <div class="container">
      <a href="/" class="logo" style="display: flex; flex-direction: column; gap: 2px; padding: 4px 0;">
        <img src="images/logo.png" alt="Shubham Xerox" style="width:45px; height:45px; object-fit:contain;">
        <span style="font-size: 0.75rem; letter-spacing: 1px; color: var(--text-main); font-weight: 800; margin-top: -6px;">SHUBHAM XEROX</span>
      </a>
      <div class="nav-links" id="adminNavLinks" style="display: none;">
        <a href="/admin">Dashboard</a>
        <div class="nav-dropdown">
          <button type="button" class="nav-dropdown-trigger">Quick Add</button>
          <div class="nav-dropdown-menu">
            <a href="/admin-add">Add Books</a>
            <a href="/admin-categories">Add/Edit Category</a>
            <a href="/admin-add-stationery">Add Stationery Item</a>
            <a href="/admin-add-spiral">Add Spiral Copy</a>
            <a href="/admin-add-combo">Add Combo Deal</a>
          </div>
        </div>
        <div class="nav-dropdown">
          <button type="button" class="nav-dropdown-trigger">Quick Manage</button>
          <div class="nav-dropdown-menu">
            <a href="/admin-products">Manage Books</a>
            <a href="/admin-ebooks">Manage E-Books</a>
          </div>
        </div>
        <div class="nav-dropdown">
          <button type="button" class="nav-dropdown-trigger">Orders</button>
          <div class="nav-dropdown-menu">
            <a href="/admin-orders">Book orders</a>
            <a href="/admin-photocopy">Photocopy orders</a>
            <a href="/admin-pdf-sales">Paid PDF orders</a>
            <a href="/admin-returns">Returned orders</a>
          </div>
        </div>
        <a href="/admin-chat" style="color: #44bd32; font-weight: 600;">Chat</a>
        <a href="#" onclick="logout()">Logout</a>
      </div>
      <div class="nav-icons">
        <!-- Theme Switch Injected by JS -->
      </div>
    </div>
  </nav>

  <main class="section" style="padding-top: 40px; min-height: 80vh;">
    <div class="container">
      <h1 class="section-title" style="text-align: left; margin-bottom: 8px;">Customer Orders</h1>
      <p id="adminOrdersCountLabel" style="color: var(--text-muted); font-size: 0.95rem; margin-bottom: 28px;">Total book orders: —</p>
      <div style="max-width: 640px; margin: 0 0 22px 0;">
        <input id="adminOrdersSearch" type="text" class="form-control" placeholder="Search by Order ID, phone, or customer name" style="border-radius: var(--radius-full); padding: 12px 18px;">
      </div>

      <div class="admin-list" id="adminOrdersList">
        <!-- Injected via JS -->
      </div>
    </div>
  </main>

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="/config.js"></script>
  <script defer src="assets/js/script.js?v=4.5"></script>
</body>
</html>
