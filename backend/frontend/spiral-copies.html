<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spiral Copies | Shubham Xerox</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="icon" type="image/png" href="images/logo.png">
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="logo" style="display:flex; flex-direction:column; gap:2px; padding:4px 0;">
        <img src="images/logo.png" alt="Shubham Xerox" style="width:45px; height:45px; object-fit:contain;">
        <span style="font-size:0.75rem; letter-spacing:1px; color:var(--text-main); font-weight:800; margin-top:-6px;">SHUBHAM XEROX</span>
      </a>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="products.html">Books & Notes</a>
        <a href="stationery.html">Stationery</a>
        <a href="spiral-copies.html" style="color:var(--primary);">Spiral Copies</a>
        <a href="index.html#services">Services</a>
        <a href="login.html" id="authLink" class="dynamic-auth-link" style="color:var(--primary);">Login</a>
      </div>
      <div class="nav-icons">
        <a href="cart.html" class="icon-btn" aria-label="Cart">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 20a1 1 0 1 0 0 2 1 1 0 0 0 0-2z"></path><path d="M20 20a1 1 0 1 0 0 2 1 1 0 0 0 0-2z"></path><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
          <span class="cart-badge" style="display:none;">0</span>
        </a>
      </div>
    </div>
  </nav>

  <main class="section" style="padding-top:40px; min-height:80vh;">
    <div class="container">
      <h1 class="section-title" style="text-align:left; margin-bottom:10px;">Spiral Copies</h1>
      <p class="section-subtitle" style="text-align:left; margin:0 0 22px 0;">Choose spiral copy bundles by page range.</p>

      <div class="spiral-filter-wrap">
        <button type="button" id="spiralFilterToggle" class="spiral-filter-toggle" aria-expanded="false" aria-controls="spiralFilterMenu">
          <span>Pages: <strong id="spiralActiveFilterLabel">All</strong></span>
          <span class="spiral-filter-caret" aria-hidden="true"></span>
        </button>
        <div id="spiralFilterMenu" class="spiral-filter-menu" role="group" aria-label="Filter spiral copies by page range">
          <button type="button" class="spiral-filter active" data-range="all">All</button>
          <button type="button" class="spiral-filter" data-range="10-50">10-50</button>
          <button type="button" class="spiral-filter" data-range="51-100">50-100</button>
          <button type="button" class="spiral-filter" data-range="101-150">100-150</button>
          <button type="button" class="spiral-filter" data-range="151-200">150-200</button>
          <button type="button" class="spiral-filter" data-range="201-250">200-250</button>
          <button type="button" class="spiral-filter" data-range="251-300">250-300</button>
          <button type="button" class="spiral-filter" data-range="301-350">300-350</button>
          <button type="button" class="spiral-filter" data-range="351-400">350-400</button>
          <button type="button" class="spiral-filter" data-range="401-450">400-450</button>
          <button type="button" class="spiral-filter" data-range="451-500">450-500</button>
        </div>
      </div>

      <div class="product-grid" id="spiralCopiesGrid"></div>
    </div>
  </main>

  <footer style="background-color:#1d1d1f; color:#86868b; padding:40px 0 20px;">
    <div class="container" style="text-align:center; font-size:0.8rem;"><p>&copy; 2026 Shubham Xerox. All rights reserved.</p></div>
  </footer>

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="/config.js"></script>
  <script defer src="assets/js/script.js?v=2.5"></script>
</body>
</html>
