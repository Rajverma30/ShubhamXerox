<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SSC Publications | Shubham Xerox</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="icon" type="image/png" href="images/logo.png">
</head>
<body>
  <nav class="navbar"><div class="container">
    <a href="index.html" class="logo" style="display:flex; flex-direction:column; gap:2px; padding:4px 0;"><img src="images/logo.png" alt="Shubham Xerox" style="width:45px; height:45px; object-fit:contain;"><span style="font-size:0.75rem; letter-spacing:1px; color:var(--text-main); font-weight:800; margin-top:-6px;">SHUBHAM XEROX</span></a>
    <div class="nav-links"><a href="index.html">Home</a><a href="exam-hub.html">Exam Hub</a><a href="ssc-publications.html" style="color:var(--primary);">SSC</a></div>
    <div class="nav-icons"><a href="cart.html" class="icon-btn" aria-label="Cart"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 20a1 1 0 1 0 0 2"></path><path d="M20 20a1 1 0 1 0 0 2"></path><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg><span class="cart-badge" style="display:none;">0</span></a></div>
  </div></nav>
  <main class="section" style="padding-top:40px; min-height:80vh;">
    <div class="container">
      <h1 class="section-title" style="text-align:left; margin-bottom:10px;">SSC Publication Brands</h1>
      <div id="publicationBrandsGrid" class="product-grid"></div>
    </div>
  </main>
  <script>
    (function () {
      const categories = JSON.parse(localStorage.getItem('shubham_categories') || '[]');
      const meta = JSON.parse(localStorage.getItem('shubham_category_meta') || '{}');
      const container = document.getElementById('publicationBrandsGrid');
      const infer = (name) => /ssc|parmar|pinnacle|railway|lucent/i.test(name || '');
      const brands = categories.filter(c => (meta[c] && meta[c].section === 'ssc') || infer(c));
      if (!brands.length) {
        container.innerHTML = '<div style="grid-column:1/-1; color:var(--text-muted); padding:24px;">No SSC brands added yet.</div>';
        return;
      }
      container.innerHTML = brands.map(name => {
        const img = meta[name] && meta[name].image;
        const href = `products.html?category=${encodeURIComponent(name)}&strict=1`;
        return `<a href="${href}" class="category-tile" style="--tile-accent:#3b82f6;"><div class="category-tile-body"><div class="category-tile-icon" style="width:110px;height:110px;">${img ? `<img src="${img}" alt="${name}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">` : `<span style="font-size:1.6rem;font-weight:800;">${name.slice(0,1).toUpperCase()}</span>`}</div><div class="category-tile-title" style="font-size:0.95rem;">${name}</div></div><div class="category-tile-btn">Open</div></a>`;
      }).join('');
    })();
  </script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script><script defer src="assets/js/script.js"></script>
</body>
</html>
