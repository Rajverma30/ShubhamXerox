<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard | Shubham Xerox</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
<link rel="icon" type="image/png" href="images/logo.png">
</head>
<body style="background-color: var(--bg-color);">

  <!-- Navigation -->
  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="logo" style="display: flex; flex-direction: column; gap: 2px; padding: 4px 0;">
        <img src="images/logo.png" alt="Shubham Xerox" style="width:45px; height:45px; object-fit:contain;">
        <span style="font-size: 0.75rem; letter-spacing: 1px; color: var(--text-main); font-weight: 800; margin-top: -6px;">SHUBHAM XEROX</span>
      </a>
      <div class="nav-links" id="adminNavLinks" style="display: none;">
        <a href="admin.html">Dashboard</a>
        <a href="admin-add.html" style="color: var(--primary);">Add Books</a>
        <a href="admin-products.html">Manage Books & Notes</a>
        <div class="nav-dropdown">
          <button type="button" class="nav-dropdown-trigger">Orders</button>
          <div class="nav-dropdown-menu">
            <a href="admin-orders.html">Book orders</a>
            <a href="admin-photocopy.html">Photocopy orders</a>
            <a href="admin-pdf-sales.html">Paid PDF orders</a>
            <a href="admin-returns.html">Returned orders</a>
          </div>
        </div>
        <a href="#" onclick="logout()">Logout</a>
      </div>
      <div class="nav-icons">
        <!-- Theme Switch -->
      </div>
    </div>
  </nav>

  <main class="section" style="padding-top: 40px; min-height: 80vh;">
    <div class="container">
      <h2 style="margin-bottom: 24px; font-size: 1.5rem;">Manage Products Inventory</h2>
      <div class="cart-layout">
        <!-- Add Product Form -->
        <div style="width: 100%; max-width: 600px; margin: 0 auto;">
          <div class="admin-card">
            <h2 style="margin-bottom: 24px; font-size: 1.25rem;">Add New Product</h2>
            <form id="adminForm">
              <div class="form-group">
                <label for="name">Product Name</label>
                <input type="text" id="name" class="form-control" required placeholder="e.g. UPSC Prelims Notes">
              </div>
              <div class="form-group">
                <label for="price">Selling Price (₹)</label>
                <input type="number" id="price" class="form-control" required placeholder="150" min="0" step="0.01">
              </div>
              <div class="form-group">
                <label for="originalPrice">Actual MRP (₹) <span style="font-size:0.8rem; color:var(--text-muted); font-weight:normal;">(Optional, for discounts)</span></label>
                <input type="number" id="originalPrice" class="form-control" placeholder="250" min="0" step="0.01">
              </div>
              <div class="form-group">
                <label for="category">Category</label>
                <input type="text" id="category" list="categoryOptions" class="form-control" required placeholder="Select or type new category">
                <datalist id="categoryOptions">
                  <!-- Injected via JS -->
                </datalist>
              </div>
              <div class="form-group">
                <label for="imgUpload1">Main Image</label>
                <input type="file" id="imgUpload1" class="form-control" accept="image/*">
              </div>
              <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                <div class="form-group">
                  <label for="imgUpload2">Image 2 (Optional)</label>
                  <input type="file" id="imgUpload2" class="form-control" accept="image/*">
                </div>
                <div class="form-group">
                  <label for="imgUpload3">Image 3 (Optional)</label>
                  <input type="file" id="imgUpload3" class="form-control" accept="image/*">
                </div>
              </div>
              <small style="color: var(--text-muted); display: block; margin-top: -10px; margin-bottom: 12px;">Capture from camera or select file. Multi-images show as a slider.</small>
              <div class="form-group">
                <label for="bookPdfPreview">Book PDF (Optional: auto-generate first 3 preview images)</label>
                <input type="file" id="bookPdfPreview" class="form-control" accept="application/pdf">
              </div>
              <div style="text-align: center; margin: 12px 0; color: var(--text-muted); font-size: 0.9rem;">OR</div>
              <div class="form-group">
                <label for="img">Image URL</label>
                <input type="url" id="img" class="form-control" placeholder="https://...">
              </div>
              <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 16px;">Add Product</button>
            </form>
          </div>
          
          <div class="admin-card" style="margin-top: 24px;">
            <h2 style="margin-bottom: 24px; font-size: 1.25rem;">Manage Categories</h2>
            <form id="addCategoryForm" style="display: flex; gap: 12px; margin-bottom: 24px;">
              <input type="text" id="newCategoryName" class="form-control" required placeholder="New Category Name">
              <button type="submit" class="btn btn-primary" style="white-space: nowrap;">Add</button>
            </form>
            <div id="adminCategoriesList" style="display: flex; flex-direction: column; gap: 8px; max-height: 300px; overflow-y: auto;">
              <!-- Categories injected via JS -->
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script defer src="assets/js/script.js"></script>
</body>
</html>
