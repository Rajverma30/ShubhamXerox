<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard | Shubham Xerox</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
<link rel="icon" type="image/png" href="images/logo.png">
</head>
<body style="background-color: var(--bg-color);">

  <!-- Navigation -->
  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="logo" style="display: flex; flex-direction: column; gap: 2px; padding: 4px 0;">
        <img src="images/logo.png" alt="Shubham Xerox" style="width:45px; height:45px; object-fit:contain;">
        <span style="font-size: 0.75rem; letter-spacing: 1px; color: var(--text-main); font-weight: 800; margin-top: -6px;">SHUBHAM XEROX</span>
      </a>
      <div class="nav-links" id="adminNavLinks" style="display: none;">
        <a href="admin.html">Dashboard</a>
        <a href="admin-add.html">Add Books</a>
        <a href="admin-products.html" style="color: var(--primary);">Manage Books & Notes</a>
        <div class="nav-dropdown">
          <button type="button" class="nav-dropdown-trigger">Orders</button>
          <div class="nav-dropdown-menu">
            <a href="admin-orders.html">Book orders</a>
            <a href="admin-photocopy.html">Photocopy orders</a>
            <a href="admin-returns.html">Returned orders</a>
          </div>
        </div>
        <a href="#" onclick="logout()">Logout</a>
      </div>
      <div class="nav-icons">
        <!-- Theme Switch Injected by JS -->
      </div>
    </div>
  </nav>

  <main class="section" style="padding-top: 40px; min-height: 80vh;">
    <div class="container">
      
      <!-- Free Notes Section -->
      <div style="border-bottom: 1px solid var(--border-color); padding-bottom: 40px; margin-bottom: 40px;">
        <h2 style="font-size: 1.5rem; margin-bottom: 24px;">Manage Free Notes</h2>
        <div class="admin-card" style="margin-bottom: 30px;">
          <h3 style="margin-bottom: 16px; font-size:1.1rem;">Upload New Free Note (PDF)</h3>
          <form id="addFreeNoteForm" style="display:flex; gap:16px; align-items:flex-end; flex-wrap:wrap;">
            <div class="form-group" style="flex: 1; min-width:200px; margin:0;">
              <label for="newNoteTitle">Note Title</label>
              <input type="text" id="newNoteTitle" class="form-control" required placeholder="e.g. MPPSC Mains Unit 1 PDF">
            </div>
            <div class="form-group" style="flex: 1; min-width:200px; margin:0;">
              <label for="newNoteFile">Select PDF</label>
              <input type="file" id="newNoteFile" class="form-control" required accept="application/pdf">
            </div>
            <button type="submit" class="btn btn-primary" id="btnUploadNote" style="padding:12px 24px;">
              <span id="btnUploadNoteText">Upload Note</span>
            </button>
          </form>
        </div>

        <div class="admin-list" id="adminFreeNotesList" style="display:grid; gap:16px;">
           <!-- Injected via JS -->
        </div>
      </div>

      <div style="margin-bottom: 30px;">
        <h2 style="font-size: 1.5rem;">Manage Paid Books</h2>
        <p style="color: var(--text-muted);">View, search, and delete books.</p>
      </div>

      <!-- Product List -->
      <div style="margin-bottom: 60px;">
        <div class="admin-list" id="adminProductsList">
          <!-- Injected via JS -->
        </div>
      </div>

      </div>
      
    </div>
  </main>

  <!-- Edit Product Modal -->
  <div class="modal-overlay" id="editProductModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(4px);">
    <div class="admin-card" style="width: 100%; max-width: 500px; margin: 0; position: relative; max-height: 90vh; overflow-y: auto;">
      <button type="button" onclick="closeEditModal()" style="position: absolute; top: 16px; right: 16px; background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--text-main);">&times;</button>
      <h2 style="margin-bottom: 24px; font-size: 1.25rem;">Edit Product</h2>
      <form id="editProductForm">
        <input type="hidden" id="editProductId">
        <div class="form-group">
          <label for="editName">Product Name</label>
          <input type="text" id="editName" class="form-control" required>
        </div>
        <div class="form-group">
          <label for="editPrice">Selling Price (â‚¹)</label>
          <input type="number" id="editPrice" class="form-control" required min="0" step="0.01">
        </div>
        <div class="form-group">
          <label for="editOriginalPrice">Actual MRP (â‚¹) <span style="font-size:0.8rem; color:var(--text-muted); font-weight:normal;">(Optional)</span></label>
          <input type="number" id="editOriginalPrice" class="form-control" min="0" step="0.01">
        </div>
        <div class="form-group">
          <label for="editCategory">Category</label>
          <input type="text" id="editCategory" list="categoryOptions" class="form-control" required>
          <datalist id="categoryOptions">
            <!-- Injected via JS -->
          </datalist>
        </div>
        <div class="form-group">
          <label for="editImgUpload">Upload New Image <span style="font-size:0.8rem; color:var(--text-muted); font-weight:normal;">(Leave blank to keep current)</span></label>
          <input type="file" id="editImgUpload" class="form-control" accept="image/*">
        </div>
        <div style="text-align: center; margin: 12px 0; color: var(--text-muted); font-size: 0.9rem;">OR</div>
        <div class="form-group">
          <label for="editImg">Image URL</label>
          <input type="url" id="editImg" class="form-control">
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 16px;">Save Changes</button>
      </form>
    </div>
  </div>

  <script src=\"https://unpkg.com/@supabase/supabase-js@2\"></script>
  <script defer src="assets/js/script.js"></script>
</body>
</html>
