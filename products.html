<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All Products | Shubham Xerox</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
<link rel="icon" type="image/png" href="images/logo.png">
</head>
<body>

  <!-- Navigation -->
  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="logo" style="display: flex; flex-direction: column; gap: 2px; padding: 4px 0;">
        <img src="images/logo.png" alt="Shubham Xerox" style="width:45px; height:45px; object-fit:contain;">
        <span style="font-size: 0.75rem; letter-spacing: 1px; color: var(--text-main); font-weight: 800; margin-top: -6px;">SHUBHAM XEROX</span>
      </a>
      
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="products.html" style="color: var(--primary);">All Products</a>
        <a href="products.html?category=Books">Books & Notes</a>
        <a href="index.html#services">Services</a>
        <a href="login.html" id="authLink" class="dynamic-auth-link" style="color: var(--primary);">Login</a>
      </div>

      <div class="nav-icons">
        <a href="cart.html" class="icon-btn" aria-label="Cart">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 20a1 1 0 1 0 0 2 1 1 0 0 0 0-2z"></path><path d="M20 20a1 1 0 1 0 0 2 1 1 0 0 0 0-2z"></path><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
          <span class="cart-badge" style="display: none;">0</span>
        </a>
      </div>
    </div>
  </nav>

  <!-- Products Section -->
  <main class="section" style="padding-top: 40px; min-height: 80vh;">
    <div class="container">
      <h1 class="section-title" style="text-align: left; margin-bottom: 24px;">Explore Catalog</h1>
      
      <div class="search-input-wrapper">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-muted);"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        <input type="text" id="searchInput" class="search-input" placeholder="Search for notes, books, or services...">
      </div>

      <div style="display: flex; gap: 16px; margin-bottom: 32px; align-items: start; flex-wrap: wrap;">
        <button class="btn btn-primary" onclick="resetCategories()" style="flex-shrink: 0;">All Products</button>
        
        <div class="multi-select-container" id="categoryMultiSelect">
          <div class="multi-select-header" onclick="toggleMultiSelect()">
            <span id="multiSelectLabel">Select Categories...</span>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>
          </div>
          <div class="multi-select-dropdown" id="multiSelectDropdown">
            <div class="multi-select-search-pannel">
              <input type="text" id="multiSelectSearch" class="multi-select-search" placeholder="Search categories..." onkeyup="filterMultiSelect()">
            </div>
            <div class="multi-select-options" id="multiSelectOptionsList">
              <!-- Checkboxes injected via JS -->
            </div>
          </div>
        </div>
      </div>
      
      <div class="active-categories-tags" id="activeCategoryTags" style="margin-bottom: 24px;"></div>

      <div class="product-grid" id="allProductsContainer">
        <!-- Injected via JS -->
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer style="background-color: #1d1d1f; color: #86868b; padding: 40px 0 20px; margin-top: auto;">
    <div class="container" style="text-align: center; font-size: 0.8rem;">
      <p>&copy; 2026 Shubham Xerox. All rights reserved.</p>
    </div>
  </footer>

  <!-- WhatsApp Floating Action Button -->
  <a href="https://wa.me/919826462963" target="_blank" class="wa-float" aria-label="Chat on WhatsApp">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
  </a>

  <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script defer src="assets/js/script.js"></script>
</body>
</html>
