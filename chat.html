<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat with Us | Shubham Xerox</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <style>
    /* Specific overrides for chat layout to look like an app */
    body {
      display: flex;
      flex-direction: column;
      height: 100vh;
      height: 100dvh; /* Prevents mobile browser bar clipping */
      margin: 0;
      background: #e5ddd5;
      /* Classic WhatsApp web background color */
      overflow: hidden;
    }
  </style>
<link rel="icon" type="image/png" href="images/logo.png">
</head>

<body>

  <!-- Chat Header -->
  <header class="chat-header">
    <div class="chat-header-info">
      <a href="index.html" class="chat-back-btn" aria-label="Go Back">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 12H5"></path>
          <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
      </a>
      <div class="chat-avatar">
        <img src="images\logo.png" alt="Shubham Xerox" onerror="this.src='https://via.placeholder.com/40'">
      </div>
      <div>
        <h2 style="font-size: 1.1rem; margin: 0; color: #fff;">Shubham Xerox</h2>
        <span style="font-size: 0.8rem; color: rgba(255,255,255,0.8); display:flex; align-items:center; gap:4px;">
          <span style="display:inline-block; width:8px; height:8px; background:#44bd32; border-radius:50%;"></span>
          Online
        </span>
      </div>
    </div>
  </header>

  <!-- Chat Messages Area -->
  <main class="chat-messages" id="chatMessagesArea">
    <div class="chat-empty-state" id="chatEmptyState">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
      </svg>
      <p>No messages yet. Send a message to start chatting!</p>
    </div>
    <!-- Messages injected via JS -->
  </main>

  <!-- Chat Input Area -->
  <footer class="chat-input-container">
    <!-- Hidden file input for PDF -->
    <input type="file" id="chatFileInput" accept="application/pdf" style="display: none;">
    <button class="chat-attach-btn" onclick="document.getElementById('chatFileInput').click();"
      aria-label="Attach File">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <path
          d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48">
        </path>
      </svg>
    </button>
    <div class="chat-input-wrapper">
      <div id="chatFilePreview" class="chat-file-preview" style="display:none;">
        <span id="chatFileName"
          style="font-size:0.8rem; flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">filename.pdf</span>
        <button onclick="clearChatFilePreview()" style="color:#ff3b30;">&times;</button>
      </div>
      <input type="text" id="chatInputMessage" class="chat-input" placeholder="Type a message..." autocomplete="off">
    </div>
    <button class="chat-send-btn" onclick="handleSendChatMessage('user')" aria-label="Send Message">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </footer>

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script defer src="assets/js/script.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Small boot script specifically for chat page to guarantee auth check and init
      setTimeout(() => {
        if (!currentUser) {
          window.location.href = 'login.html';
        } else {
          initUserChat();
        }
      }, 500);

      // Listen for file selection to show preview
      document.getElementById('chatFileInput').addEventListener('change', (e) => {
        if (e.target.files && e.target.files[0]) {
          document.getElementById('chatFilePreview').style.display = 'flex';
          document.getElementById('chatFileName').textContent = e.target.files[0].name;
        }
      });

      // Allow enter key to send
      document.getElementById('chatInputMessage').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') handleSendChatMessage('user');
      });
    });

    function clearChatFilePreview() {
      document.getElementById('chatFileInput').value = '';
      document.getElementById('chatFilePreview').style.display = 'none';
      document.getElementById('chatFileName').textContent = '';
    }
  </script>
</body>

</html>
