<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard | Shubham Xerox</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body style="background-color: var(--bg-color);">

  <!-- Navigation -->
  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="logo" style="display: flex; flex-direction: column; gap: 2px; padding: 4px 0;">
        <svg width="45" height="45" viewBox="0 0 100 100" fill="none" stroke="url(#logoGrad)" stroke-width="8" stroke-linejoin="round" stroke-linecap="round">
          <defs>
            <linearGradient id="logoGrad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#df2020" />
              <stop offset="100%" stop-color="#14143a" />
            </linearGradient>
          </defs>
          <path d="M 10 65 L 30 25 L 50 75 L 70 25 L 90 65 L 50 90 Z" />
          <path d="M 30 25 L 50 5 L 70 25" />
        </svg>
        <span style="font-size: 0.75rem; letter-spacing: 1px; color: var(--text-main); font-weight: 800; margin-top: -6px;">SHUBHAM XEROX</span>
      </a>
      <div class="nav-links" id="adminNavLinks" style="display: none;">
        <a href="admin.html" style="color: var(--primary);">Dashboard</a>
        <a href="admin-add.html">Add Books</a>
        <a href="admin-products.html">Manage Books</a>
        <a href="admin-orders.html">Orders</a>
        <a href="#" onclick="logout()">Logout</a>
      </div>
      <div class="nav-icons">
        <!-- Theme Switch -->
      </div>
    </div>
  </nav>

  <main class="section" style="padding-top: 40px; min-height: 80vh;">
    <div class="container">
      <h1 style="margin-bottom: 32px; font-size: 2rem; color: var(--text-main);">Dashboard Stats</h1>
      
      <!-- Metrics Cards -->
      <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 24px; margin-bottom: 48px;">
        <div class="admin-card" style="text-align: center; padding: 32px;">
          <h3 style="color: var(--text-muted); margin-bottom: 12px;">Total Visitors</h3>
          <div id="statVisitors" style="font-size: 2.5rem; font-weight: 800; color: var(--primary);">--</div>
        </div>
        <div class="admin-card" style="text-align: center; padding: 32px;">
          <h3 style="color: var(--text-muted); margin-bottom: 12px;">Total Books</h3>
          <div id="statBooks" style="font-size: 2.5rem; font-weight: 800; color: var(--primary);">--</div>
        </div>
        <div class="admin-card" style="text-align: center; padding: 32px;">
          <h3 style="color: var(--text-muted); margin-bottom: 12px;">Total Orders</h3>
          <div id="statOrders" style="font-size: 2.5rem; font-weight: 800; color: var(--primary);">--</div>
        </div>
      </div>

      <!-- Graph -->
      <div class="admin-card" style="margin-bottom: 48px;">
        <h2 style="margin-bottom: 24px; font-size: 1.5rem;">Visits this Week</h2>
        <div style="width: 100%; height: 400px; display: flex; justify-content: center; align-items: center;">
          <canvas id="visitsChart"></canvas>
        </div>
      </div>

      <!-- Registered Users -->
      <h2 style="margin-bottom: 24px; font-size: 1.5rem;">Registered Users</h2>
      <div class="admin-list" id="adminUsersList" style="margin-bottom: 60px;">
        <div style="padding: 24px; color: var(--text-muted);">Loading users...</div>
      </div>
      
    </div>
  </main>

  <script async src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/script.js"></script>
</body>
</html>
