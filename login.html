<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Shubham Xerox</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
<link rel="icon" type="image/png" href="images/logo.png">
</head>
<body>

  <!-- Navigation -->
  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="logo" style="display: flex; flex-direction: column; gap: 2px; padding: 4px 0;">
        <img src="images/logo.png" alt="Shubham Xerox" style="width:45px; height:45px; object-fit:contain;">
        <span style="font-size: 0.75rem; letter-spacing: 1px; color: var(--text-main); font-weight: 800; margin-top: -6px;">SHUBHAM XEROX</span>
      </a>
    </div>
  </nav>

  <main style="min-height: 80vh; padding: 20px;">
    <div class="auth-container">
      <h2>Welcome Back</h2>
      <p>Log in to access your notes and orders</p>

      <form id="loginForm">
        <div class="form-group" style="text-align: left;">
          <label for="phone">Phone Number</label>
          <input type="tel" id="phone" class="form-control" placeholder="10-digit number" required pattern="[0-9]{10}">
        </div>
        <div class="form-group" style="text-align: left;">
          <label for="loginPassword">Password</label>
          <input type="password" id="loginPassword" class="form-control" placeholder="Enter password" required minlength="8">
        </div>
        <button type="submit" class="btn btn-primary" id="loginBtn" style="width: 100%;"><span class="spinner"></span> Login</button>
      </form>
      <button type="button" id="forgotToggleBtn" class="btn btn-outline-purple" style="width:100%; margin-top:10px;">Forgot Password?</button>

      <form id="forgotPasswordForm" style="display:none; margin-top:14px; border:1px solid var(--border-color); border-radius:10px; padding:14px;">
        <p style="color: var(--text-muted); font-weight: 500; font-size: 0.9rem; margin-bottom: 12px;">We’ll send an OTP to verify your phone number.</p>
        <div class="form-group" style="text-align: left;">
          <label for="forgotPhone">Phone Number</label>
          <input type="tel" id="forgotPhone" class="form-control" placeholder="10-digit number" pattern="[0-9]{10}" required>
        </div>
        <div class="otp-btn-group">
          <button type="button" class="btn btn-sms" onclick="requestForgotPasswordOTP(this, 'sms')"><span class="spinner"></span> SMS OTP</button>
          <button type="button" class="btn btn-whatsapp" onclick="requestForgotPasswordOTP(this, 'whatsapp')"><span class="spinner"></span> WhatsApp OTP</button>
        </div>
        <div class="form-group" style="text-align: left;">
          <label for="forgotOtp">Enter OTP</label>
          <input type="text" id="forgotOtp" class="form-control" placeholder="6-digit OTP" pattern="[0-9]{6}" required>
        </div>
        <div class="form-group" style="text-align: left;">
          <label for="forgotNewPassword">New Password</label>
          <input type="password" id="forgotNewPassword" class="form-control" placeholder="Set new password" minlength="8" required>
        </div>
        <div class="form-group" style="text-align: left;">
          <label for="forgotConfirmPassword">Confirm New Password</label>
          <input type="password" id="forgotConfirmPassword" class="form-control" placeholder="Confirm new password" minlength="8" required>
        </div>
        <button type="submit" class="btn btn-primary" id="resetBtn" style="width:100%;"><span class="spinner"></span> Reset Password</button>
      </form>

      <a href="register.html" class="auth-link">Don't have an account? Sign up here</a>
    </div>
  </main>

  <!-- Footer -->
  <footer style="background-color: #1d1d1f; color: #86868b; padding: 40px 0 20px; margin-top: auto;">
    <div class="container" style="text-align: center; font-size: 0.8rem;">
      <p>&copy; 2026 Shubham Xerox. All rights reserved.</p>
    </div>
  </footer>

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script defer src="assets/js/script.js"></script>
</body>
</html>
